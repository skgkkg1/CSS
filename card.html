<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .card {
            height: 300px;
            width: 400px;
            border: 1px solid black;
            border-radius: 5px;
            padding: 20px;
        }
        .card figure img{
            width:100%;
            border-radius: 10px;
        } 
    </style>
</head>

<body>
    <div class="card">
        <figure>
            <img src="https://broadwayinfosys.com/uploads/courses/22651776920695.webp" alt="Web Design Training">
        </figure>
        <h3>Web Design Training</h3>
        <h5>2.5 Months</h5>
    </div>
</body>

</html>
