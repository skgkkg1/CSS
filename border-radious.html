<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border-Radioud</title>
    <style>
        .w-h-200px{
            height: 200px;
            width: 200px;
        }
        .box1{
            /* height: 400px;
            width: 400px; */
            background-color: blue;
            border-radius: 5px 50px ;
        }
        .box2{
            /* height: 400px;
            width: 400px; */
            background-color: rgb(0, 251, 255);
            border-radius: 5px 50px ;
        }
        .box3{
            /* height: 400px;
            width: 400px; */
            background-color: rgb(233, 0, 250);
            border-radius: 5px 50px ;
        }
        .box4{
            height: 400px;
            width: 400px;
            background-color: rgb(0, 255, 64);
            border-radius: 50% ;
        }
    </style>
</head>
<body>
    <div class="box1 w-h-200px">"Box"</div>
    <div class="box2 w-h-200px">"Box2"</div>
    <div class="box3 w-h-200px">"BOx3"</div>
    <div class="box4">"BOx4"</div>
</body>
</html>
