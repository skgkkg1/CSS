<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin</title>
    <style>
        .box1 {
            height: 200px;
            width: 200px;
            background-color: lightcoral;
            margin: 44px;
        }
        .box2 {
            height: 200px;
            width: 200px;
            background-color: rgb(94, 192, 246);
            /* margin: 44px; */
            margin: 0px auto;

        }
    </style>
</head>

<body>
    <div class="box1">Box1</div>
    <div class="box2">Box2</div>
</body>

</html>
